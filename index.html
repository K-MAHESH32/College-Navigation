  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- Phosphor Icons (for premium look) -->

  <!-- App Styles -->
  <link rel="stylesheet" href="style.css?v=4.3">

  <!-- Main App Container -->
  <div class="app-container">
    <!-- Top Professional Navbar -->
    <nav class="header-navbar">
      <p class="nav-subtitle">CAMPUS NAVIGATION DASHBOARD</p>
      <div class="logo-container">
        <h1 class="nav-title">SRI VASAVI ENGINEERING COLLEGE</h1>
      </div>
      <p class="nav-address">Pedatadepalli, Tadepalligudem, A.P, India</p>
    </nav>

    <main class="main-dashboard">
      <!-- Left Controls Panel -->
      <aside class="sidebar-controls">
        <div class="glass-panel search-card">
          <h2 class="card-label">Destination</h2>
          <div class="input-group">
            <i class="ph ph-magnifying-glass input-icon"></i>
            <input type="text" id="destination-search" class="premium-select" placeholder="Let's Go!" autocomplete="off"
              list="dest-list">
            <button id="mic-search-btn" class="mic-search-btn" title="Voice Search">
              <i class="ph ph-microphone"></i>
            </button>
            <datalist id="dest-list"></datalist>
          </div>

          <div class="action-grid">
            <button id="start-nav-btn" class="dashboard-btn primary-btn disabled" disabled>
              <i class="ph ph-navigation-arrow"></i> START
            </button>
            <button id="stop-nav-btn-mobile" class="dashboard-btn danger-btn mobile-only hidden">
              EXIT NAVIGATION
            </button>
            <button id="voice-toggle-btn" class="dashboard-btn icon-btn" title="Voice">
              <i class="ph ph-speaker-high" id="voice-icon"></i>
            </button>
          </div>
        </div>

        <div id="route-info-panel" class="glass-panel route-info-card hidden">
          <div class="route-header">
            <button id="mobile-back-btn" class="mobile-back-btn mobile-only" title="Back to Map">
              <i class="ph ph-arrow-left"></i>
            </button>
            <i class="ph ph-path"></i>
            <span>Route Details</span>
          </div>
          <div class="route-stats">
            <div class="stat-item">
              <span class="val" id="stat-distance">--</span>
              <span class="lab">Meters</span>
            </div>
            <div class="stat-item">
              <span class="val" id="stat-time">--</span>
              <span class="lab">Minutes</span>
            </div>
          </div>
          <div class="instructions-scroll">
            <ul id="instructions-list" class="instructions-list"></ul>
          </div>
          <button id="stop-nav-btn" class="dashboard-btn danger-btn desktop-only">Exit Navigation</button>
        </div>
      </aside>

      <!-- Right Map Box -->
      <section class="map-view-box">
        <div id="map" class="boxed-map"></div>
        <button id="recenter-btn" class="map-action-btn" title="Recenter View">
          <i class="ph ph-crosshair"></i>
        </button>

        <!-- Mobile Navigation HUD -->
        <div id="mobile-nav-hud" class="mobile-nav-hud mobile-only hidden">
          <div class="hud-item">
            <i class="ph ph-navigation-arrow"></i>
            <span id="hud-distance">-- m</span>
          </div>
          <div class="hud-divider"></div>
          <div class="hud-item">
            <i class="ph ph-clock"></i>
            <span id="hud-time">-- min</span>
          </div>
        </div>

        <button id="mobile-route-toggle" class="map-action-btn mobile-only hidden" title="Route Details">
          <i class="ph ph-list-bullets"></i>
        </button>
      </section>
    </main>
  </div>
